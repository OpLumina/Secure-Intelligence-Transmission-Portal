# worker_processes intentionally omitted — the Iron Bank Nginx entrypoint
# (30-tune-worker-processes.sh) injects this directive automatically.
# Declaring it here causes a duplicate directive error on startup.
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid; # Iron Bank Nginx runs as non-root — must use /tmp

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /var/log/nginx/access.log;

    # ── Temp paths — explicit paths required for non-root Iron Bank Nginx.
    # Without these, Nginx attempts to auto-create subdirs under a root-owned
    # parent tmpfs and fails with permission denied on multipart uploads.
    client_body_temp_path  /var/cache/nginx/client_temp  1 2;
    proxy_temp_path        /var/cache/nginx/proxy_temp;
    fastcgi_temp_path      /var/cache/nginx/fastcgi_temp;
    uwsgi_temp_path        /var/cache/nginx/uwsgi_temp;
    scgi_temp_path         /var/cache/nginx/scgi_temp;

    # ── Resource limits (STIG SRG-APP-000246 / DoS mitigation) ────────────────
    # Raised to 12 MB to accommodate multipart reports with file attachments.
    # The per-file limit (10 MB) is enforced by Node/multer; Nginx is the outer bound.
    client_max_body_size  12M;
    client_body_timeout   30s;
    client_header_timeout 10s;
    send_timeout          30s;
    keepalive_timeout     65s;

    # ── Identity cloaking (SRG-APP-000427) ────────────────────────────────────
    server_tokens off;
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
    proxy_hide_header X-AspNet-Version;
    proxy_hide_header X-AspNetMvc-Version;

    # ── Global security headers (STIG V-222604, V-222606) ────────────────────
    # NOTE: These apply to all locations unless overridden with add_header in a
    # child block. Child add_header directives REPLACE ALL parent headers for
    # that location — so every child block that uses add_header must re-declare
    # the full mandatory header set. Missing any header in a child block means
    # that header is silently absent for that route.

    # Clickjacking protection
    add_header X-Frame-Options          "DENY"                  always;
    # MIME-sniff prevention
    add_header X-Content-Type-Options   "nosniff"               always;
    # Legacy XSS filter (belt-and-suspenders — modern browsers use CSP)
    add_header X-XSS-Protection         "1; mode=block"         always;
    # Referrer policy — suppress referrer to prevent metadata leakage
    add_header Referrer-Policy          "no-referrer"           always;
    # Feature/Permissions policy — disable unnecessary browser APIs
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()" always;
    # CSP — permissive enough for the public submission page (openpgp.min.js)
    # upgrade-insecure-requests intentionally omitted — service is HTTP-only
    # inside the Tor enclave; including it would break resource loading.
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; form-action 'self';" always;
    # Cache control — prevent browsers caching sensitive pages
    add_header Cache-Control            "no-store, no-cache, must-revalidate, private" always;
    add_header Pragma                   "no-cache"              always;

    # ── Rate limiting (STIG SRG-APP-000246) ───────────────────────────────────
    # Zones keyed on binary IP — more memory-efficient than string IP
    limit_req_zone  $binary_remote_addr  zone=global_limit:10m    rate=10r/s;
    limit_req_zone  $binary_remote_addr  zone=api_limit:10m       rate=5r/s;
    limit_req_zone  $binary_remote_addr  zone=submit_limit:10m    rate=2r/m;
    limit_req_zone  $binary_remote_addr  zone=login_limit:10m     rate=5r/m;

    # Apply global rate limit to all requests; tighter limits override per-location
    limit_req  zone=global_limit  burst=20  nodelay;

    server {
        listen 8080;
        server_name _;

        server_name_in_redirect off;
        port_in_redirect        off;

        root  /usr/share/nginx/html;
        index index.html;

        # ------------------------------------------------------------------
        # HEALTH CHECK — internal only, not proxied to backend
        # ------------------------------------------------------------------
        location = /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type           "application/json"  always;
            add_header X-Content-Type-Options "nosniff"           always;
            add_header X-Frame-Options        "DENY"              always;
            add_header Cache-Control          "no-store"          always;
        }

        # ------------------------------------------------------------------
        # HARDENING: Block hidden files and directories (.env, .git, etc.)
        # ------------------------------------------------------------------
        location ~ /\. {
            deny all;
            access_log    off;
            log_not_found off;
        }

        # ------------------------------------------------------------------
        # HARDENING: Block sensitive directories at the proxy edge
        # ------------------------------------------------------------------
        location ~ ^/(db|logs|pgp/priv|views)(/|$) {
            deny all;
            access_log    off;
            log_not_found off;
        }

        # ------------------------------------------------------------------
        # STATIC: OpenPGP.js library (only needed by public submission page)
        # ------------------------------------------------------------------
        location = /pgp/openpgp.min.js {
            alias /app/pgp/openpgp.min.js;
            add_header Content-Type           "application/javascript"                     always;
            add_header X-Content-Type-Options "nosniff"                                    always;
            add_header X-Frame-Options        "DENY"                                       always;
            add_header Referrer-Policy        "no-referrer"                                always;
            add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()"   always;
            add_header Cache-Control          "public, max-age=86400"                      always;
        }

        # ------------------------------------------------------------------
        # STATIC: Public PGP key (for client-side encryption of report JSON)
        # ------------------------------------------------------------------
        location /pgp/pub/ {
            alias /pgp/pub/;
            autoindex off; # STIG: Prevent directory listing
            add_header Content-Type           "text/plain; charset=utf-8"                  always;
            add_header X-Content-Type-Options "nosniff"                                    always;
            add_header X-Frame-Options        "DENY"                                       always;
            add_header Referrer-Policy        "no-referrer"                                always;
            add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()"   always;
            # FIX: $scheme://$host resolves to the internal Docker network scheme/host,
            # not the client-facing onion address. Use $http_host which reflects
            # the Host header as sent by the client (the onion or 127.0.0.1:8080).
            add_header Access-Control-Allow-Origin "$http_host"                            always;
            add_header Cache-Control          "public, max-age=3600"                       always;
        }

        # ------------------------------------------------------------------
        # ADMIN — proxy to Node with tighter CSP, no file uploads
        # ------------------------------------------------------------------
        location /admin {
            limit_req zone=api_limit burst=5 nodelay;

            resolver 127.0.0.11 valid=30s; # Docker internal DNS
            set $upstream_admin http://uplink-app:3000;
            proxy_pass $upstream_admin;

            proxy_http_version 1.1;
            proxy_read_timeout    60s;
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;

            # Admin page never loads openpgp.min.js — stricter CSP
            # Full header set re-declared because child add_header replaces parent.
            add_header Content-Security-Policy  "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; connect-src 'self'; frame-ancestors 'none'; form-action 'none';" always;
            add_header X-Frame-Options          "DENY"                  always;
            add_header X-Content-Type-Options   "nosniff"               always;
            add_header X-XSS-Protection         "1; mode=block"         always;
            add_header Referrer-Policy          "no-referrer"           always;
            add_header Permissions-Policy       "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
            add_header Cache-Control            "no-store, no-cache, must-revalidate, private" always;
            add_header Pragma                   "no-cache"              always;
        }

        # ------------------------------------------------------------------
        # API: Login endpoint — aggressive rate limiting
        # ------------------------------------------------------------------
        location = /api/login {
            limit_req zone=login_limit burst=3 nodelay;

            resolver 127.0.0.11 valid=30s;
            set $upstream_app http://uplink-app:3000;
            proxy_pass $upstream_app;

            proxy_http_version 1.1;
            proxy_read_timeout    60s;
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;

            # FIX: Full security header set re-declared.
            # Child add_header directives replace ALL parent headers for this
            # location — omitting any header here means it is silently dropped
            # for login responses. All mandatory STIG headers must be present.
            add_header Content-Security-Policy  "default-src 'none';" always;
            add_header X-Frame-Options          "DENY"                always;
            add_header X-Content-Type-Options   "nosniff"             always;
            add_header X-XSS-Protection         "1; mode=block"       always;
            add_header Referrer-Policy          "no-referrer"         always;
            add_header Permissions-Policy       "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
            add_header Cache-Control            "no-store, no-cache, must-revalidate, private" always;
            add_header Pragma                   "no-cache"            always;
        }

        # ------------------------------------------------------------------
        # API: Submit-intel — rate limited, larger body allowed
        # ------------------------------------------------------------------
        location = /api/submit-intel {
            limit_req zone=submit_limit burst=2 nodelay;

            client_max_body_size 12M; # Must match http-level value

            resolver 127.0.0.11 valid=30s;
            set $upstream_app http://uplink-app:3000;
            proxy_pass $upstream_app;

            proxy_http_version 1.1;
            proxy_read_timeout    120s; # Allow time for large encrypted uploads
            proxy_connect_timeout  30s;
            proxy_send_timeout     60s;
            # NOTE: proxy_request_buffering is intentionally ON (default) so that
            # client_max_body_size is enforced before the body reaches Node.
            # Disabling it would allow the upstream to receive oversized bodies.

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;

            # FIX: Full security header set re-declared.
            # Child add_header replaces parent headers for this location.
            add_header Content-Security-Policy  "default-src 'none';" always;
            add_header X-Content-Type-Options   "nosniff"             always;
            add_header X-Frame-Options          "DENY"                always;
            add_header X-XSS-Protection         "1; mode=block"       always;
            add_header Referrer-Policy          "no-referrer"         always;
            add_header Permissions-Policy       "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
            add_header Cache-Control            "no-store"            always;
        }

        # ------------------------------------------------------------------
        # ALL OTHER ROUTES — proxy to Node backend
        # ------------------------------------------------------------------
        location / {
            limit_req zone=api_limit burst=10 nodelay;

            resolver 127.0.0.11 valid=30s;
            set $upstream_app http://uplink-app:3000;
            proxy_pass $upstream_app;

            proxy_http_version 1.1;
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
        }

        # ------------------------------------------------------------------
        # ERROR PAGES — static, not proxied (correct HTTP status preserved)
        # ------------------------------------------------------------------
        error_page 404 /404.html;
        location = /404.html {
            root     /usr/share/nginx/html;
            internal;
            add_header Cache-Control "no-store" always;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root     /usr/share/nginx/html;
            internal;
            add_header Cache-Control "no-store" always;
        }
    }
}